<svg xmlns="http://www.w3.org/2000/svg" width="280" height="180" viewBox="0 0 280 180" role="img">
  <title>NFL Draft Board — Trade History</title>
  <desc>A draft board grid showing picks acquired (green) and traded away (red) across rounds 1–5, representing NFL team draft trade history</desc>

  <!-- Background -->
  <rect width="280" height="180" rx="10" fill="#f8f9fa"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="280" height="36" rx="10" fill="#007FBF"/>
  <rect x="0" y="22" width="280" height="14" fill="#007FBF"/>
  <text x="140" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">2024 Draft Trade History</text>

  <!-- Round labels -->
  <text x="10" y="65"  font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6b7280" text-anchor="start">Rd 1</text>
  <text x="10" y="90"  font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6b7280" text-anchor="start">Rd 2</text>
  <text x="10" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6b7280" text-anchor="start">Rd 3</text>
  <text x="10" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6b7280" text-anchor="start">Rd 4</text>
  <text x="10" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6b7280" text-anchor="start">Rd 5</text>

  <!-- ── Round 1 slots ── -->
  <!-- neutral -->
  <rect x="38" y="52" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- acquired (green) -->
  <rect x="64" y="52" width="22" height="18" rx="3" fill="#d1f5d9" stroke="#6fcf97" stroke-width="0.5"/>
  <text x="75" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2a7a3a" text-anchor="middle">↑</text>
  <!-- neutral -->
  <rect x="90" y="52" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- traded away (red) -->
  <rect x="116" y="52" width="22" height="18" rx="3" fill="#fde8e8" stroke="#f09595" stroke-width="0.5"/>
  <text x="127" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#a32d2d" text-anchor="middle">↓</text>
  <!-- neutral -->
  <rect x="142" y="52" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- acquired -->
  <rect x="168" y="52" width="22" height="18" rx="3" fill="#d1f5d9" stroke="#6fcf97" stroke-width="0.5"/>
  <text x="179" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2a7a3a" text-anchor="middle">↑</text>
  <!-- neutral -->
  <rect x="194" y="52" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- acquired -->
  <rect x="220" y="52" width="22" height="18" rx="3" fill="#d1f5d9" stroke="#6fcf97" stroke-width="0.5"/>
  <text x="231" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2a7a3a" text-anchor="middle">↑</text>
  <!-- neutral -->
  <rect x="246" y="52" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>

  <!-- ── Round 2 slots ── -->
  <!-- traded away -->
  <rect x="38" y="77" width="22" height="18" rx="3" fill="#fde8e8" stroke="#f09595" stroke-width="0.5"/>
  <text x="49" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#a32d2d" text-anchor="middle">↓</text>
  <!-- neutral -->
  <rect x="64" y="77" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- neutral -->
  <rect x="90" y="77" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- acquired -->
  <rect x="116" y="77" width="22" height="18" rx="3" fill="#d1f5d9" stroke="#6fcf97" stroke-width="0.5"/>
  <text x="127" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2a7a3a" text-anchor="middle">↑</text>
  <!-- traded away -->
  <rect x="142" y="77" width="22" height="18" rx="3" fill="#fde8e8" stroke="#f09595" stroke-width="0.5"/>
  <text x="153" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#a32d2d" text-anchor="middle">↓</text>
  <!-- neutral -->
  <rect x="168" y="77" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- neutral -->
  <rect x="194" y="77" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- acquired -->
  <rect x="220" y="77" width="22" height="18" rx="3" fill="#d1f5d9" stroke="#6fcf97" stroke-width="0.5"/>
  <text x="231" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2a7a3a" text-anchor="middle">↑</text>
  <!-- neutral -->
  <rect x="246" y="77" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>

  <!-- ── Round 3 slots ── -->
  <!-- neutral -->
  <rect x="38" y="102" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- acquired -->
  <rect x="64" y="102" width="22" height="18" rx="3" fill="#d1f5d9" stroke="#6fcf97" stroke-width="0.5"/>
  <text x="75" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2a7a3a" text-anchor="middle">↑</text>
  <!-- traded away -->
  <rect x="90" y="102" width="22" height="18" rx="3" fill="#fde8e8" stroke="#f09595" stroke-width="0.5"/>
  <text x="101" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#a32d2d" text-anchor="middle">↓</text>
  <!-- neutral -->
  <rect x="116" y="102" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- neutral -->
  <rect x="142" y="102" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- traded away -->
  <rect x="168" y="102" width="22" height="18" rx="3" fill="#fde8e8" stroke="#f09595" stroke-width="0.5"/>
  <text x="179" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#a32d2d" text-anchor="middle">↓</text>
  <!-- neutral -->
  <rect x="194" y="102" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- acquired -->
  <rect x="220" y="102" width="22" height="18" rx="3" fill="#d1f5d9" stroke="#6fcf97" stroke-width="0.5"/>
  <text x="231" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2a7a3a" text-anchor="middle">↑</text>
  <!-- neutral -->
  <rect x="246" y="102" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>

  <!-- ── Round 4 slots ── -->
  <!-- neutral -->
  <rect x="38" y="127" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- traded away -->
  <rect x="64" y="127" width="22" height="18" rx="3" fill="#fde8e8" stroke="#f09595" stroke-width="0.5"/>
  <text x="75" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#a32d2d" text-anchor="middle">↓</text>
  <!-- neutral -->
  <rect x="90" y="127" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- neutral -->
  <rect x="116" y="127" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- acquired -->
  <rect x="142" y="127" width="22" height="18" rx="3" fill="#d1f5d9" stroke="#6fcf97" stroke-width="0.5"/>
  <text x="153" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2a7a3a" text-anchor="middle">↑</text>
  <!-- neutral -->
  <rect x="168" y="127" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- traded away -->
  <rect x="194" y="127" width="22" height="18" rx="3" fill="#fde8e8" stroke="#f09595" stroke-width="0.5"/>
  <text x="205" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#a32d2d" text-anchor="middle">↓</text>
  <!-- neutral -->
  <rect x="220" y="127" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- acquired -->
  <rect x="246" y="127" width="22" height="18" rx="3" fill="#d1f5d9" stroke="#6fcf97" stroke-width="0.5"/>
  <text x="257" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2a7a3a" text-anchor="middle">↑</text>

  <!-- ── Round 5 slots ── -->
  <!-- acquired -->
  <rect x="38" y="152" width="22" height="18" rx="3" fill="#d1f5d9" stroke="#6fcf97" stroke-width="0.5"/>
  <text x="49" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2a7a3a" text-anchor="middle">↑</text>
  <!-- neutral -->
  <rect x="64" y="152" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- traded away -->
  <rect x="90" y="152" width="22" height="18" rx="3" fill="#fde8e8" stroke="#f09595" stroke-width="0.5"/>
  <text x="101" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#a32d2d" text-anchor="middle">↓</text>
  <!-- neutral -->
  <rect x="116" y="152" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- neutral -->
  <rect x="142" y="152" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- acquired -->
  <rect x="168" y="152" width="22" height="18" rx="3" fill="#d1f5d9" stroke="#6fcf97" stroke-width="0.5"/>
  <text x="179" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2a7a3a" text-anchor="middle">↑</text>
  <!-- neutral -->
  <rect x="194" y="152" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- neutral -->
  <rect x="220" y="152" width="22" height="18" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="0.5"/>
  <!-- traded away -->
  <rect x="246" y="152" width="22" height="18" rx="3" fill="#fde8e8" stroke="#f09595" stroke-width="0.5"/>
  <text x="257" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#a32d2d" text-anchor="middle">↓</text>

</svg>

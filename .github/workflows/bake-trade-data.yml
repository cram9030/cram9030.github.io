name: Refresh Trade Data

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      years:
        description: 'Years to bake (space-separated integers, or "all")'
        required: false
        default: 'all'

jobs:
  bake:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install nflreadpy polars

      - name: Bake trade data
        run: |
          YEARS="${{ github.event.inputs.years || 'all' }}"
          python3 scripts/bake_trade_data.py \
            --years $YEARS \
            --output-dir assets/data/trades/ \
            --charts-dir assets/data/

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/trades/
          git diff --staged --quiet || \
            git commit -m "chore: refresh trade data $(date -u +%Y-%m-%d) [skip ci]"
          git push
